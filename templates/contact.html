<!-- Contact Section -->

<div class="container my-5">

<h1 class="text-center text-success mb-4">
📞 Contact Us
</h1>

<div class="row">

<!-- Contact Form -->

<div class="col-md-7">

<div class="card shadow">

<div class="card-body">

<h3>Send a Message</h3>

<form action="/submit" method="post">

<div class="mb-3">

<label class="form-label">
Full Name
</label>

<input type="text"
name="name"
class="form-control"
placeholder="Enter your name"
required>

</div>

<div class="mb-3">

<label class="form-label">
Email Address
</label>

<input type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<div class="mb-3">

<label class="form-label">
Message
</label>

<textarea
name="message"
class="form-control"
rows="5"
placeholder="Write your message"
required></textarea>

</div>

<button type="submit" class="btn btn-success">
Send Message
</button>

</form>

</div>
